name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # No `version` input: the action reads `packageManager` from the root
      # package.json; supplying both errors ("Multiple versions of pnpm specified").
      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5

      # Must come after pnpm/action-setup so the pnpm store cache resolves.
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - run: |
          node --version
          which pnpm
          node -p "require('/home/runner/setup-pnpm/node_modules/pnpm/package.json').version"
          pnpm --version

      - run: pnpm install --frozen-lockfile

      - run: pnpm -r typecheck

      - run: pnpm test

      - run: pnpm coverage
