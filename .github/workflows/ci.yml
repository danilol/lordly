name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Never cancel main runs — every main commit keeps a completed CI verdict.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      # corepack reads `packageManager` from the root package.json and fetches
      # that exact pnpm. (pnpm/action-setup v6 was tried first: its bootstrap
      # + self-update path crashes or leaves a broken binary when the pinned
      # version differs from the bundled one — see story 1.1 debug log.)
      - run: |
          mkdir -p "$RUNNER_TEMP/corepack-bin"
          corepack enable --install-directory "$RUNNER_TEMP/corepack-bin"
          echo "$RUNNER_TEMP/corepack-bin" >> "$GITHUB_PATH"

      # Must come after pnpm is on PATH so the pnpm store cache resolves.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: "pnpm"

      - run: node --version && pnpm --version

      - run: pnpm install --frozen-lockfile

      - run: pnpm -r typecheck

      # `pnpm coverage` runs the identical full suite with instrumentation,
      # so a separate `pnpm test` step would run everything twice.
      - run: pnpm coverage

      - run: pnpm --filter web build

  deploy:
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - run: |
          mkdir -p "$RUNNER_TEMP/corepack-bin"
          corepack enable --install-directory "$RUNNER_TEMP/corepack-bin"
          echo "$RUNNER_TEMP/corepack-bin" >> "$GITHUB_PATH"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter web build

      # `run` is required: bare `pnpm deploy` invokes pnpm's builtin, not this script.
      - run: pnpm --filter web run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
