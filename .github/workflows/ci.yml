name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Never cancel main runs — every main commit keeps a completed CI verdict.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: ./.github/actions/setup-workspace

      - run: node --version && pnpm --version

      - run: pnpm -r typecheck

      # `pnpm coverage` runs the identical full suite with instrumentation,
      # so a separate `pnpm test` step would run everything twice.
      - run: pnpm coverage

      - run: pnpm --filter web build

      # Hand the built site to the deploy job — it must ship exactly what CI verified.
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        with:
          name: web-dist
          path: apps/web/dist

  deploy:
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      # Scoped install: only apps/web (+ its workspace deps) — enough for wrangler.
      - uses: ./.github/actions/setup-workspace
        with:
          install-filter: web

      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: web-dist
          path: apps/web/dist

      # `run` is required: bare `pnpm deploy` invokes pnpm's builtin, not this script.
      - run: pnpm --filter web run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
