wall 44.5%/49.3%, twin-golems 40.7%/53.6%), web build succeeds. balanceVersion UNCHANGED (no balance-data change). FLAGGED for a PRD/dossier touch: FR38 + dossier §2 still describe the old 2-cell monster (bundle with the dragon-deferral deviation in deferred-work.md). Awaiting: deploy to main + senior code review. | 2026-07-20: DEVICE-REPORTED FOLLOW-UP, ROUND 7 (before code review) — [SUPERSEDED by the single-cell model revision above] REVERTS ROUND 6. Round 6's 4-direction adjacency was wrong; Danilo settled it by pasting his OB64 research verbatim (authoritative per his OB64-fidelity standing instruction): the confirmed rule is HORIZONTAL ONLY — a small can't be placed in a tile if a monster occupies the SAME ROW in an ADJACENT COLUMN. Back corners of a front-anchored monster + the monster's own column beyond its 2 body cells stay FREE (exactly rounds 1-5's behavior before round 6 broke it). Reverted validate.ts to horizontal-only adjacentCols; ai.ts golem-wall back to front-center (recovered sweep strength 44.5%/49.3% from round 6's weak 26.7%/39.3%); arbitraries.ts to lone-monster-any-column + independent anchor rows. 3 assertion-level tests flipped back; battle fixtures round 6 moved off-center stayed valid (horizontal ⊂ 4-direction). Verified via legalAnchors probe against Danilo's final ASCII. My honest mistake: over-corrected in round 6 from one screenshot without reconciling against the source. Gate GREEN: 538 tests, typecheck+lint+prettier clean, engine cov 97.93% lines, both-mode sweep in band (single 63.4%/wipeout 64.0%), web build succeeds. Awaiting: deploy to main + senior code review. | 2026-07-20: DEVICE-REPORTED FOLLOW-UP, ROUND 6 (before code review) — [SUPERSEDED by round 7 — 4-direction rule was wrong] rounds 2-5's adjacency rule was only horizontal. Danilo found a case it missed: two Golems (mismatched anchors, columns left/right) left front/left placeable, when a monster's own too-tall body should reserve its ENTIRE column, not just the 2 cells it occupies plus the neighboring column's matching rows — confirmed against the source game again (not reproducible in real OB64's normal flow, which is why it survived 4 rounds). footprintViolation's adjacency check generalized from adjacentCols (horizontal-only) to a full adjacentCells (all 4 orthogonal neighbors), correctly excluding a monster's own OTHER footprint cell from its own ban registration. Confirmed consequence, not a bug: a lone monster is now only legal at an EDGE column (CENTER leaves just 2 free cells, need 3); two monsters only completable with MATCHING anchor rows (mismatched leaves 0 free). ai.ts's golem-wall moved off center again; test/arbitraries.ts gained monsterRowsArb forcing matching rows for 2 monsters (without it the generator crashed outright). Every fixture with a monster at center or mismatched anchors reworked across validate/monster/golden/match-flow/placement.test.ts (golden #11 re-recorded). Correction on my part: an earlier claim (round 2) that mismatched anchors leave 1-2 free cells was a math error under the horizontal-only rule; under the confirmed full rule it's genuinely 0. Gate GREEN: 538 tests (fixture rework, no net-new), typecheck+lint+prettier clean, engine cov 98.18% lines, both-mode sweep re-confirmed in band (single max 63.4%, wipeout max 64.0%; golem-wall dropped to 26.7%/39.3%, weaker without a center screen but still in band) web build succeeds. Awaiting: deploy to main + senior code review. | 2026-07-20: DEVICE-REPORTED FOLLOW-UP, ROUND 5 (before code review) — round 3's fix was backwards. Danilo rejected it: dropping a Golem on the BACK row must show the NAMED CARD there (where dropped), with the "body" marker on the OTHER cell (front-ward); round 3 did the opposite (card jumped to mid, body at back). Fixed by changing what the board stores: MatchState.playerPlacements[i] is now each unit's DISPLAY cell, not its engine anchor. New exported toAnchor(cls, cell) in placement.ts derives the real front-most anchor (AD-14, unchanged at the engine) on demand at every engine-facing call site: occupiedCells/bannedCells/placeUnit's legality check, PlacementScene's firstFreeCell + its "other footprint cell" marker lookup, and MatchFlow.commit()'s handoff to the engine (the ONE normalization point). Also fixed a latent bug round 3 introduced unnoticed: the scene's drop-rejection toast would have false-fired on a successful back-row drop (never caught — round 3's tests didn't reach the scene's drop handler). Tests corrected in placement.test.ts/match-flow.test.ts + new coverage for toAnchor and commit()'s normalization. Gate GREEN: 538 tests (+2 over round 4), typecheck+lint+prettier clean, web build succeeds. Pure shell change, no sweep re-verification needed. Awaiting: deploy to main + senior code review. | 2026-07-20: DEVICE-REPORTED FOLLOW-UP, ROUND 4 (before code review) — the "GOL body" reserved-cell marker (round 1) only covered a monster's OWN derived cell; a cell merely ADJACENT to a monster (illegal since round 2) still rendered as a plain empty square with no visible reason a drop fails there — e.g. two Golems anchored mid-left/mid-right both ban mid/center AND back/center, neither showed anything. Fixed with a new exported bannedCells(board, classes) in placement.ts (every empty cell a small can't legally occupy, via the engine's own legalAnchors — AD-14, no re-derived adjacency math) + a distinct red "blocked" visual in PlacementScene.ts (vs. the blue "body" tint). New placement.test.ts tests pin the exact screenshotted scenario. Gate GREEN: 536 tests (+3 over round 3), typecheck+lint+prettier clean, web build succeeds. No engine/balance change, so no sweep re-verification needed. Awaiting: deploy to main + senior code review. | 2026-07-19: DEVICE-REPORTED FOLLOW-UP, ROUND 3 (same day, before code review) — dragging a Golem onto the visual BACK-row cell always failed ("Can't place there"), when it should give the monster its other valid orientation (mid+back) — confirmed against the source game. Root cause: the shell passed the literal dropped cell straight to the engine as the anchor, and 'back' is correctly always an illegal anchor at the engine level (AD-14 — no row after it to derive a second cell from); the gap was purely in how the shell translates a drop into an anchor request. Fixed entirely in placement.ts: placeUnit now re-anchors a monster's back-row drop to mid in the same column BEFORE any legality check. No engine change. Two tests rewritten to assert the new re-anchor behavior instead of the old reject-outright one. Gate GREEN: 533 tests (unchanged count), typecheck+lint+prettier clean, web build succeeds. No engine/balance change, so no sweep re-verification needed. Awaiting: deploy to main + senior code review. | 2026-07-19: DEVICE-REPORTED FOLLOW-UP, ROUND 2 (same day, before code review) — Danilo confirmed the adjacency rule against the SOURCE GAME itself (a screenshot: "You cannot position other characters next to large characters"), showing round 1's fix below was too narrow (monster-vs-monster only). The confirmed rule bans ANY unit — human or monster — from standing horizontally adjacent to a monster's footprint cell in the same row. validate.ts's footprintViolation rewritten around a general two-way cell-adjacency check (monsters-too-close renamed adjacent-to-monster, no longer monster-specific); ai.ts's golem-wall archetype re-placed a second time (its witch was beside the Golem); test/arbitraries.ts's generator simplified to call the engine's own legalAnchors for the small-cell pool. Wide fixture ripple: every hand-built battle with a filler small standing beside a monster (legal under round 1) needed rework, including golden #11 — its "empty back row" premise for ranged-reaches-rear is no longer achievable with a full 5-slot army under this broader rule, so its scope narrowed to blockade + acts-from-anchor (the ranged/blast-tie proofs already live in monster.test.ts's dedicated fixtures). docs/rules.md + rules-doc.test.ts updated to the broader wording; new tests added directly replaying the confirmed scenario. Gate GREEN: 533 tests (+2 over round 1), typecheck+lint+prettier clean, engine cov 99.43% lines, web build succeeds, both-mode sweep re-confirmed in band (single max 63.5%/wipeout max 64.5%) no re-tune needed. Awaiting: deploy to main + senior code review. | 2026-07-19: DEVICE-REPORTED FOLLOW-UP (same day, before code review) — Danilo's own testing found 2 issues: (1) the shell let him draft 3 Golems and place 2 in NEIGHBORING columns (visibly touching), then hit an uncaught InvalidMatchSetupError at commit with a console-only failure and a stuck Ready button — root cause: widening CLASS_TEXT/CLASS_ABBREVIATIONS/UNIT_FRAMES for TS exhaustiveness had made Golem a REAL selectable/placeable Draft/Placement class with none of the matching legality logic; (2) a design gap — monsters should never be adjacent-column, not just same-column, and a monster should never be crownable as leader. Fixed both as NEW engine rules (monsters-share-column renamed monsters-too-close + widened to column-adjacency — on a 3-col grid 2 monsters are now legal ONLY at left+right; new monster-cannot-lead violation; chooseSetup's AI leader draw excludes monster indices, still 1 stream draw; MAX_MONSTERS_PER_ARMY promoted to an exported constant) PLUS a deliberately minimal shell patch (canAddUnit takes the candidate class; placement.ts's model calls the engine's own canPlace and REJECTS an illegal drop instead of accepting it blind; MatchFlow.setLeader rejects a monster at the gesture; PlacementScene toasts every rejection incl. a wrapped commit() and renders a monster's derived rear cell as visibly reserved) — full 2-cell rendering/UI stays 4.9's job. Every fixture across validate/monster/golden/ai.test.ts that defaulted its leader to a Golem-at-index-0 re-audited and fixed (wide mechanical ripple, not a design change). Gate GREEN: 531 tests (was 514, +17 new across validate/draft-model/placement/match-flow/rules-doc.test.ts), typecheck+lint+prettier clean, engine cov 99.42% lines, web build succeeds, both-mode sweep re-confirmed in band (single max 61.1%/wipeout max 64.6%) no re-tune needed. Awaiting: deploy to main + senior code review. | 2026-07-19: dev-story DONE — the Golem (12th class, Brute, 2-slot monster) fights correctly in the pure engine. footprintCells(class,anchor) is the ONE derived-footprint source (AD-14): anchor=front-most cell, back illegal, monster body = anchor + one row back, same column. validateMatchSetup grows footprint-aware overlap checks + 3 new violation codes (anchor-back-illegal, too-many-monsters, monsters-share-column); legalAnchors/canPlace share ONE legality implementation with it (property-tested: canPlace ⇔ validateMatchSetup agree on a full battery of cases). Two-cell TARGETED semantics (dossier §2/D-2f) via a new rearRowIndex on TargetCandidate/UnitState: melee reaches the FRONT cell and blocks both rows of its column, ranged reaches the REAR cell, blast counts the monster in BOTH occupied rows for the fullest-row pick but hits it ONCE (still one UnitState). ACTS reads the ANCHOR row unchanged (action count, move-kind, FR13 tie-break) — Golem joins the melee case in act()/misfire() with a uniform 'slash' move. AI archetype tuples widened to variable-length arrays (golem-wall 1-monster + twin-golems 2-monster archetypes added); matchSetupArb rewritten to generate slot-legal 0–2-monster armies by construction (weighted 50/30/20 toward 0/1/2 monsters — uniform starved branch-reachability property tests that need several smalls on one side, e.g. guard.test.ts's ally-behind case; fixed by reweighting + bumping that test's numRuns to 500 with an explicit 20s timeout). balanceVersion 8→9 (hash 57107fa9: +golem class row). NO logVersion bump (a monster changes no event shape, AD-15). New test/monster.test.ts (11 tests: melee blockade, ranged rear-snipe incl. a truly-back small beating a shallower monster, blast double-count deciding a genuine tie, ACTS-from-anchor, plus property tests for hit-once and id-only event references) + new golden #11 (Golem exercising all three TARGETED paths + ACTS in one audited battle). Both-mode sweep in band NO re-tune (single max 62.3% cabal / wipeout max 64.3% farshot-composition; golem-wall 48.2%/49.8%, twin-golems 44.7%/60.3%; wardens floor 30.3%/42.4% stays viable). docs/rules.md gains a "Monsters" section + 2 new rules-doc.test.ts drift-guard tests pinning slot cost/role to BALANCE; deferred-work.md gets the formal "dragon and golem" PRD-follow-up pointer (dossier D-1b — Golem-only wave 1, dragon deferred). Gate GREEN: 514 tests, typecheck+lint+prettier clean, engine cov 99.41% lines, web build succeeds. NO device session (pure engine — story 4.9 owns the on-phone monster). Awaiting: deploy to main + senior code review. | 2026-07-19: story created (baseline 82f8d3d). SCOPE NARROWED to GOLEM ONLY per dossier D-1b (signed off) — the epics/PRD "dragon and golem" is STALE, dragon deferred to a later slayer-class wave (flagged for a PRD/correct-course touch). Golem = the 12th class: Brute, 2 slots, HP 300/VIT 36/MEN 8 (physical wall that melts to magic, pure stats — no Artillery→Brute relation), actions 2/1/1, code GOL. Core engine task = the two-cell semantics (dossier §2/D-2f): footprintCells(class,anchor) as the ONE derived-footprint source (AD-14, anchor=front-most, back illegal); validate.ts grows footprint-aware overlap + new violation codes (anchor-back-illegal, too-many-monsters, monsters-share-column) + legalAnchors/canPlace sharing ONE legality impl with validateMatchSetup; targeting.ts TARGETED semantics (melee=front cell/blocks both rows, ranged=rear cell, blast counts both rows + hit-once) via a new rearRowIndex on TargetCandidate/UnitState; ACTS reads the anchor (free — rowIndex already = anchor). AI archetype tuples go variable-length (Golem army is 4 or 3 units); matchSetupArb must emit slot-legal monster boards (load-bearing — a